<style>
/* Специфичные стили для каталога */
:root {
  --bg: #020617;
  --card: rgba(15,23,42,.75);
  --accent: #38bdf8;
  --text: #e5e7eb;
  --muted: #9aa7b2;
  --bg-overlay-soft: rgba(15,23,42,.75);
  --border-light: rgba(255,255,255,.06);
  --border-medium: rgba(255,255,255,.04);
  --primary-glow: rgba(56,189,248,.6);
  --primary-glow-soft: rgba(56,189,248,.15);
  --gold: #F5D76E;
  --gold-glow: rgba(245, 215, 110, 0.5);
}

body {
  margin: 0;
  min-height: 100svh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: 
    radial-gradient(circle at top, #0f172a, transparent 60%),
    radial-gradient(circle at bottom, #020617, #000);
  font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
  color: var(--text);
  padding: 20px 14px;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,.03) 0,
    rgba(255,255,255,.03) 1px,
    transparent 1px,
    transparent 40px
  );
  pointer-events: none;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
  flex: 1;
  width: 100%;
  box-sizing: border-box;
}

/* HEADER */
header {
  width: 100%;
  background: var(--bg-overlay-soft);
  border-radius: 22px;
  padding: 26px 28px;
  backdrop-filter: blur(14px);
  box-shadow: 
    0 0 40px var(--primary-glow-soft),
    inset 0 0 0 1px var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  box-sizing: border-box;
}

/* ЗОЛОТОЙ ЗАГОЛОВОК */
.main-title {
  font-family: var(--font-serif, 'Playfair Display', serif);
  font-size: 28px;
  font-weight: 900;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: .14em;
  text-shadow: 0 0 12px var(--gold-glow);
}

/* КНОПКА "ВЕРНУТЬСЯ К СПИСКУ КАНАЛОВ" — ЗОЛОТАЯ */
.btn-back {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(245, 215, 110, 0.1);
  border: 1px solid rgba(245, 215, 110, 0.5);
  padding: 10px 20px;
  border-radius: 40px;
  font-family: var(--font-sans, 'Inter', sans-serif);
  font-weight: 600;
  font-size: 14px;
  color: var(--gold);
  text-decoration: none;
  transition: all 0.2s ease;
  cursor: pointer;
  backdrop-filter: blur(4px);
  white-space: nowrap;
}

.btn-back:hover {
  background: rgba(245, 215, 110, 0.25);
  border-color: var(--gold);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(245,215,110,0.2);
}

.btn-back:active {
  transform: translateY(1px);
}

/* ПОИСК */
.controls {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.search {
  background: #ffffff;
  border: 2px solid #1e293b;
  padding: 10px 14px;
  border-radius: 12px;
  color: #0f172a;
  outline: none;
  font-family: var(--font-sans, 'Inter', sans-serif);
  font-weight: 500;
  min-width: 200px;
}

.search::placeholder {
  color: #64748b;
  opacity: 0.8;
}

.search:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,215,110,0.3);
}

/* ОБЩЕЕ КОЛИЧЕСТВО КАНАЛОВ — ЗОЛОТОЕ, БЕЗ ФОНА */
.total {
  padding: 8px 14px;
  border-radius: 999px;
  background: transparent;
  color: var(--gold);
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
  text-shadow: 0 0 4px var(--gold-glow);
}

/* GROUPS */
.groups {
  display: grid;
  gap: 16px;
  width: 100%;
  box-sizing: border-box;
}

details.group {
  background: var(--bg-overlay-soft);
  border-radius: 20px;
  padding: 16px;
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-light);
  width: 100%;
  box-sizing: border-box;
}

summary {
  list-style: none;
  cursor: pointer;
  display: flex;
  gap: 14px;
  align-items: center;
}

summary::-webkit-details-marker {
  display: none;
}

.group-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  overflow: hidden;
  flex: 0 0 48px;
  box-shadow: 0 0 18px rgba(0,0,0,.6);
  background: #0a0a1a;
}

.group-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.group-info {
  flex: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* ЗОЛОТЫЕ НАЗВАНИЯ ГРУПП */
.group-name {
  font-weight: 600;
  font-size: 15px;
  color: var(--gold);
  text-shadow: 0 0 4px var(--gold-glow);
}

.group-meta {
  font-size: 13px;
  color: var(--muted);
}

/* КАНАЛЫ */
.channels {
  margin-top: 16px;
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}

.channel {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border-medium);
  transition: 0.2s;
}

.channel:hover {
  border-color: var(--gold);
  box-shadow: 0 0 15px rgba(245,215,110,0.2);
}

.ch-icon {
  width: 52px;
  height: 36px;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
  flex: 0 0 52px;
}

.ch-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ch-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ch-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}

.ch-meta {
  font-size: 12px;
  color: var(--muted);
}

/* FOOTER */
.footer {
  margin-top: auto;
  padding-top: 30px;
  padding-bottom: 20px;
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  opacity: .85;
  border-top: 1px solid var(--border-medium);
}

/* МОБИЛЬНАЯ АДАПТАЦИЯ */
@media (max-width: 768px) {
  header {
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }
  
  .controls {
    justify-content: center;
    width: 100%;
  }
  
  .search {
    width: 100%;
    min-width: auto;
  }
}

@media (max-width: 600px) {
  body {
    padding: 12px;
  }
  
  .wrap {
    gap: 16px;
  }
  
  header {
    padding: 18px;
  }
  
  .main-title {
    font-size: 22px;
  }
  
  .promo-badge {
    font-size: 28px;
  }
  
  .promo-text, 
  .promo-link {
    font-size: 12px;
  }
  
  .btn-int {
    padding: 8px 18px;
    font-size: 13px;
    white-space: nowrap;
  }
  
  .controls {
    width: 100%;
    flex-direction: column;
    align-items: center;   /* ← добавляем центрирование по горизонтали */
    gap: 10px;
  }
  
  .search {
    width: 100%;
    min-width: auto;
    box-sizing: border-box;
  }
  
  .total {
    width: auto;
    display: inline-block;
    text-align: center;
  }
  
  .channels {
    grid-template-columns: 1fr;
  }
  
  .group-info {
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
}

@media (max-width: 480px) {
  .btn-back {
    font-size: 12px;
    padding: 6px 14px;
  }
}
</style>

const groupsContainer = document.getElementById('groupsContainer');
const searchInput = document.getElementById('search');
const totalBox = document.getElementById('total');

function render(groups) {
  groupsContainer.innerHTML = '';
  let total = 0;

  groups.forEach((g, i) => {
    total += g.channels.length;
    const det = document.createElement('details');
    det.className = 'group';
    if (i === 0) det.open = true;

    const sum = document.createElement('summary');

    const ic = document.createElement('div');
    ic.className = 'group-icon';
    const img = document.createElement('img');
    img.src = g.icon;
    img.onerror = function() { this.style.display = 'none'; };
    ic.appendChild(img);

    const info = document.createElement('div');
    info.className = 'group-info';

    const name = document.createElement('div');
    name.className = 'group-name';
    name.textContent = g.name;

    const meta = document.createElement('div');
    meta.className = 'group-meta';
    meta.textContent = g.channels.length + ' каналов';

    info.appendChild(name);
    info.appendChild(meta);

    sum.appendChild(ic);
    sum.appendChild(info);
    det.appendChild(sum);

    const chWrap = document.createElement('div');
    chWrap.className = 'channels';

    g.channels.forEach(ch => {
      const el = document.createElement('div');
      el.className = 'channel';

      const ci = document.createElement('div');
      ci.className = 'ch-icon';
      if (ch.icon) {
        const im = document.createElement('img');
        im.src = ch.icon;
        im.onerror = function() { this.style.display = 'none'; };
        ci.appendChild(im);
      }

      const body = document.createElement('div');
      body.className = 'ch-body';

      const n = document.createElement('div');
      n.className = 'ch-name';
      n.textContent = ch.name;

      const m = document.createElement('div');
      m.className = 'ch-meta';
      m.textContent = ch.archive || 'Архив: -';

      body.appendChild(n);
      body.appendChild(m);

      el.appendChild(ci);
      el.appendChild(body);
      chWrap.appendChild(el);
    });

    det.appendChild(chWrap);
    groupsContainer.appendChild(det);
  });

  totalBox.textContent = 'Общее количество каналов: ' + total;
}

// Проверка, что данные существуют, и рендеринг
if (groupsData && groupsData.length > 0) {
  render(groupsData);
} else {
  groupsContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#9aa7b2;">📺 Данные каналов отсутствуют. Пожалуйста, вставьте ваш groupsData в код.</div>';
  totalBox.textContent = 'Общее количество каналов: 0';
}

// Поиск
searchInput.addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    if (groupsData && groupsData.length) render(groupsData);
    return;
  }
  
  if (groupsData && groupsData.length) {
    render(
      groupsData.map(g => ({
        ...g,
        channels: g.channels.filter(c => c.name.toLowerCase().includes(q))
      })).filter(g => g.channels.length)
    );
  }
});
</script>

</body>
</html>
