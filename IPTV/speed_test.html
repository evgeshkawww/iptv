    function I(i){return document.getElementById(i);}

var s=new Speedtest();
s.setParameter("telemetry_level","basic");

function initServers(){
    var noServersAvailable=function(){
        I("message").innerHTML="No servers available";
    }
    var runServerSelect=function(){
        s.selectServer(function(server){
            if(server!=null){
                I("loading").className="hidden";
                for(var i=0;i<SPEEDTEST_SERVERS.length;i++){
                    if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
                    if(SPEEDTEST_SERVERS[i].serveropen==="YES"){
                        var option=document.createElement("option");
                        option.value=i;
                        option.textContent=SPEEDTEST_SERVERS[i].name;
                        I("server").appendChild(option);
                    }
                }
                var optionSeparator=document.createElement("option");
                optionSeparator.disabled=true;
                optionSeparator.textContent="─────────────────";
                I("server").appendChild(optionSeparator);
                var optionAllAvailable=document.createElement("option");
                optionAllAvailable.value="all_available";
                optionAllAvailable.textContent="Все доступные сервера";
                optionAllAvailable.selected=true;
                I("server").appendChild(optionAllAvailable);
                var optionAllFull=document.createElement("option");
                optionAllFull.value="all_with_filled";
                optionAllFull.textContent="Все сервера";
                I("server").appendChild(optionAllFull);
                I("testWrapper").className="visible";
                initUI();
                setTimeout(function(){startStop();},1500);
            }else{
                noServersAvailable();
            }
        });
    }
    if(typeof SPEEDTEST_SERVERS==="string"){
        s.loadServerList(SPEEDTEST_SERVERS,function(servers){
            if(servers==null){noServersAvailable();
            }else{SPEEDTEST_SERVERS=servers;runServerSelect();}
        });
    }else{
        s.addTestPoints(SPEEDTEST_SERVERS);
        runServerSelect();
    }
}

var meterBk=/Trident.*rv:(\d+\.\d+)/i.test(navigator.userAgent)?"#EAEAEA":"#80808040";
var dlColor="#6060AA", ulColor="#616161", progColor=meterBk;

function drawMeter(c,amount,bk,fg,progress,prog){
    var ctx=c.getContext("2d");
    var dp=window.devicePixelRatio||1;
    var cw=c.clientWidth*dp, ch=c.clientHeight*dp;
    var sizScale=ch*0.0055;
    if(c.width==cw&&c.height==ch){ctx.clearRect(0,0,cw,ch);
    }else{c.width=cw;c.height=ch;}
    ctx.beginPath();
    ctx.strokeStyle=bk;
    ctx.lineWidth=12*sizScale;
    ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,Math.PI*0.1);
    ctx.stroke();
    ctx.beginPath();
    ctx.strokeStyle=fg;
    ctx.lineWidth=12*sizScale;
    ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,amount*Math.PI*1.2-Math.PI*1.1);
    ctx.stroke();
    if(typeof progress!=="undefined"){
        ctx.fillStyle=prog;
        ctx.fillRect(c.width*0.3,c.height-16*sizScale,c.width*0.4*progress,4*sizScale);
    }
}
function mbpsToAmount(s){return 1-(1/(Math.pow(1.3,Math.sqrt(s))));}
function format(d){d=Number(d);if(d<10)return d.toFixed(2);if(d<100)return d.toFixed(1);return d.toFixed(0);}

var uiData=null;
function startStop(){
    if(s.getState()==3){
        stopAllTests=true;
        serversToTest=[];
        s.abort();
        document.getElementById("currentTest").innerHTML="⛔ Тест прерван";
        uiData=null;
        I("startStopBtn").className="";
        I("server").disabled=false;
        initUI();
        return;
    }else{
        I("startStopBtn").className="running";
        I("shareArea").style.display="none";
        I("server").disabled=true;
        prepareResultTable();
        var serverSelect=I("server");
        var selectedValue=serverSelect.value;
        if(selectedValue==="all_available"||selectedValue==="all_with_filled"){
            prepareMultiTest(selectedValue);
        }else{
            runSingleServerTest();
        }
    }
}

function prepareResultTable(){
    let currentDateTime=new Date().toLocaleString();
    if(document.getElementById("generatedTime")){
        document.getElementById("generatedTime").innerHTML='Сгенерировано: '+currentDateTime;
    }else{
        var timeDiv=document.createElement("div");
        timeDiv.id="generatedTime";
        timeDiv.innerHTML='Сгенерировано: '+currentDateTime;
        timeDiv.style.marginTop="10px";
        timeDiv.style.marginBottom="5px";
        timeDiv.style.fontSize="0.9em";
        timeDiv.style.color="#555";
        document.getElementById("test").appendChild(timeDiv);
    }
    if(!document.getElementById("multi_results")){
        document.getElementById("test").innerHTML+='<table id="multi_results"><tbody></tbody></tr>';
        var styles=`table,tr,th,td{border:1px solid #C0C0C0;margin:0 auto;border-collapse:collapse;border-spacing:0;padding:7px 10px;}#multi_results{margin-top:20px;}`;
        var styleSheet=document.createElement("style");
        styleSheet.innerHTML=styles;
        document.head.appendChild(styleSheet);
    }
    document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML='<tr><th>Сервер</th><th title="Пинг, мс">Ping</th><th title="Джиттер, мс">Jit</th><th title="Скорость, Мбит/с">DL</th><th>Оценка</th></tr>';
}

function runSingleServerTest(){
    var serverIndex=I("server").value;
    var serverObj=SPEEDTEST_SERVERS[serverIndex];
    document.getElementById("currentTest").innerHTML="Тестируется: "+serverObj.name;
    s.onupdate=function(data){uiData=data;};
    s.onend=function(aborted){
        I("startStopBtn").className="";
        I("server").disabled=false;
        updateUI(true);
        if(!aborted){
            var rating=getServerRating(uiData.jitterStatus, uiData.dlStatus, uiData.pingStatus);
            appendResult(serverObj.name, serverObj.serveropen, uiData.dlStatus, uiData.pingStatus, uiData.jitterStatus);
            if(rating==="💎"){
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox recommended"><span class="recommendIcon">👍</span> Рекомендован (💎): <strong>'+serverObj.name+'</strong></div>';
            }else if(rating==="⭐⭐⭐"){
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox recommended"><span class="recommendIcon">👍</span> Рекомендован (⭐⭐⭐): <strong>'+serverObj.name+'</strong></div>';
            }else{
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox notRecommended"><span class="recommendIcon">👎</span> Не рекомендован ('+rating+')</div>';
            }
            try{
                var testId=uiData.testId;
                if(testId!=null){
                    var shareURL=window.location.href.substring(0,window.location.href.lastIndexOf("/"))+"/results/?id="+testId;
                    I("resultsImg").src=shareURL;
                    I("resultsURL").value=shareURL;
                    I("testId").innerHTML=testId;
                    I("shareArea").style.display="";
                }
            }catch(e){}
        }
    };
    s.start();
}

function prepareMultiTest(groupType){
    stopAllTests=false;
    groupTestResults=[];
    currentServer=0;
    serversToTest=[];
    for(var i=0;i<SPEEDTEST_SERVERS.length;i++){
        if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
        if(groupType==="all_available"&&SPEEDTEST_SERVERS[i].serveropen!=="YES") continue;
        serversToTest.push(i);
    }
    if(serversToTest.length>0){
        currentServer=serversToTest[0];
        document.getElementById("currentTest").innerHTML="Тестируется: "+SPEEDTEST_SERVERS[currentServer].name+" (1 из "+serversToTest.length+")";
        s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
        startMultiTest();
    }else{
        I("startStopBtn").className="";
        I("server").disabled=false;
        I("currentTest").innerHTML="Нет серверов для тестирования";
    }
}

function startMultiTest(){
    if(s.getState()==3){
        s.abort();
        I("startStopBtn").className="";
        I("server").disabled=false;
        document.getElementById("currentTest").innerHTML='';
        return;
    }
    var testTimeout=null;
    var testCompleted=false;
    testTimeout=setTimeout(function(){
        if(!testCompleted){
            testCompleted=true;
            appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, "Таймаут", "Таймаут", "Таймаут");
            groupTestResults.push({index:currentServer, name:SPEEDTEST_SERVERS[currentServer].name, serveropen:SPEEDTEST_SERVERS[currentServer].serveropen, dl:"Таймаут", ping:"Таймаут", jitter:"Таймаут", rating:"💀"});
            s.abort();
            moveToNextServer();
        }
    },30000);
    s.onupdate=function(data){uiData=data;};
    s.onend=function(aborted){
        clearTimeout(testTimeout);
        if(testCompleted){return;}
        testCompleted=true;
        if(stopAllTests){
            appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, "⛔ STOP", "⛔ STOP", "⛔ STOP");
            I("startStopBtn").className="";
            I("server").disabled=false;
            document.getElementById("currentTest").innerHTML="⛔ Тест прерван";
            return;
        }
        if(!uiData) uiData={dlStatus:0, pingStatus:999, jitterStatus:999};
        var dlValue=(uiData.dlStatus>0)?uiData.dlStatus:0;
        var pingValue=(uiData.pingStatus<999)?uiData.pingStatus:0;
        var jitterValue=(uiData.jitterStatus<999)?uiData.jitterStatus:0;
        if(aborted&&dlValue===0){
            appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, "Таймаут", "Таймаут", "Таймаут");
            groupTestResults.push({index:currentServer, name:SPEEDTEST_SERVERS[currentServer].name, serveropen:SPEEDTEST_SERVERS[currentServer].serveropen, dl:"Таймаут", ping:"Таймаут", jitter:"Таймаут", rating:"💀"});
        }else{
            var rating=getServerRating(jitterValue, dlValue, pingValue);
            appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, dlValue, pingValue, jitterValue);
            groupTestResults.push({index:currentServer, name:SPEEDTEST_SERVERS[currentServer].name, serveropen:SPEEDTEST_SERVERS[currentServer].serveropen, dl:dlValue, ping:pingValue, jitter:jitterValue, rating:rating});
        }
        moveToNextServer();
    };
    function moveToNextServer(){
        var currentIndex=serversToTest.indexOf(currentServer);
        if(currentIndex<serversToTest.length-1){
            currentServer=serversToTest[currentIndex+1];
            document.getElementById("currentTest").innerHTML="Тестируется: "+SPEEDTEST_SERVERS[currentServer].name+" ("+(currentIndex+2)+" из "+serversToTest.length+")";
            s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
            setTimeout(function(){startMultiTest();},500);
        }else{
            I("startStopBtn").className="";
            I("server").disabled=false;
            var bestServer=findBestServer(groupTestResults);
            if(bestServer){
                var ratingSymbol=bestServer.rating;
                var ratingText="";
                if(ratingSymbol==="💎") ratingText="💎 АЛМАЗНЫЙ СЕРВЕР 💎";
                else if(ratingSymbol==="⭐⭐⭐") ratingText="⭐⭐⭐ ОТЛИЧНЫЙ СЕРВЕР";
                else if(ratingSymbol==="⭐⭐") ratingText="⭐⭐ ХОРОШИЙ СЕРВЕР";
                else if(ratingSymbol==="⭐") ratingText="⭐ ПРИЕМЛЕМЫЙ СЕРВЕР";
                else ratingText="РЕКОМЕНДОВАН";
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox recommended">👍 Рекомендован: <strong>'+bestServer.name+'</strong> '+ratingText+'</div>';
            }else{
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox notRecommended">👎 Нет подходящих серверов</div>';
            }
        }
    }
    s.start();
}

function appendResult(server, serveropen, dl, ping, jitter){
    // ВАЖНО: порядок параметров: server, serveropen, dl, ping, jitter
    // А в getServerRating нужно передавать (jitter, dl, ping)
    var rating = getServerRating(jitter, dl, ping);
    
    var pingDisplay = ping;
    if(ping==="Таймаут"||ping==="⛔ STOP"){
        pingDisplay=ping;
    }else if(typeof ping==='number'){
        pingDisplay=format(ping)+" ms";
    }
    var dlDisplay = dl;
    if(typeof dl==='number'){
        dlDisplay=format(dl)+" Mbps";
    }
    var jitterDisplay = jitter;
    if(typeof jitter==='number'){
        jitterDisplay=format(jitter)+" ms";
    }
    document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML+='<tr><td>'+server+'</td><td>'+pingDisplay+'</td><td>'+jitterDisplay+'</td><td>'+dlDisplay+'</td><td>'+rating+'</td></tr>';
}

// Функция определения рейтинга: параметры (jitter, dl, ping)
function getServerRating(jitter, dl, ping){
    var jitterNum=Number(jitter);
    var dlNum=Number(dl);
    var pingNum=Number(ping);
    
    if(isNaN(jitterNum)||isNaN(dlNum)||isNaN(pingNum)) return "💀";
    if(dlNum<=0||pingNum<=0||pingNum>=999) return "💀";
    
    if(dlNum<30||jitterNum>=15) return "💀";
    
    // 💎 АЛМАЗ: джиттер < 4, скорость > 100, пинг < 50
    if(dlNum>=100 && jitterNum<4 && pingNum<50) return "💎";
    
    // ⭐⭐⭐ ОТЛИЧНО: джиттер < 4, скорость > 100
    if(dlNum>=100 && jitterNum<4) return "⭐⭐⭐";
    
    // ⭐⭐⭐ ХОРОШО: стандартные критерии
    if(dlNum>=80 && jitterNum<5) return "⭐⭐⭐";
    
    // ⭐⭐ НОРМАЛЬНО
    if(dlNum>=50 && jitterNum<10) return "⭐⭐";
    
    // ⭐ ПРИЕМЛЕМО
    if(dlNum>=30) return "⭐";
    
    return "💀";
}

function findBestServer(results){
    if(!results||results.length===0) return null;
    
    var validServers=results.filter(function(server){
        if(server.dl==="Таймаут"||server.dl==="⛔ STOP") return false;
        if(typeof server.dl!=='number') return false;
        return server.dl>0 && server.ping>0 && server.ping<999;
    });
    
    if(validServers.length===0) return null;
    
    // Сначала ищем 💎 серверы
    var diamondServers=validServers.filter(function(server){
        var rating=server.rating || getServerRating(server.jitter, server.dl, server.ping);
        return rating==="💎";
    });
    
    var candidateServers;
    if(diamondServers.length>0){
        candidateServers=diamondServers;
    }else{
        candidateServers=validServers;
    }
    
    function ratingValue(rating){
        if(rating==="💎") return 5;
        if(rating==="⭐⭐⭐") return 4;
        if(rating==="⭐⭐") return 3;
        if(rating==="⭐") return 2;
        return 1;
    }
    
    candidateServers.sort(function(a,b){
        var ratingA=a.rating || getServerRating(a.jitter, a.dl, a.ping);
        var ratingB=b.rating || getServerRating(b.jitter, b.dl, b.ping);
        var ratingValA=ratingValue(ratingA);
        var ratingValB=ratingValue(ratingB);
        if(ratingValA!==ratingValB) return ratingValB-ratingValA;
        var pingA=Number(a.ping);
        var pingB=Number(b.ping);
        if(pingA!==pingB) return pingA-pingB;
        var jitterA=Number(a.jitter);
        var jitterB=Number(b.jitter);
        if(jitterA!==jitterB) return jitterA-jitterB;
        var speedA=Number(a.dl);
        var speedB=Number(b.dl);
        return speedB-speedA;
    });
    
    return candidateServers[0];
}

var groupTestResults=[];
var serversToTest=[];
var currentServer=0;
var stopAllTests=false;

function updateUI(forced){
    if(!forced&&s.getState()!=3) return;
    if(uiData==null) return;
    var status=uiData.testState;
    I("ip").textContent=uiData.clientIp;
    I("dlText").textContent=(status==1&&uiData.dlStatus==0)?"...":format(uiData.dlStatus);
    drawMeter(I("dlMeter"),mbpsToAmount(Number(uiData.dlStatus*(status==1?oscillate():1))),meterBk,dlColor,Number(uiData.dlProgress),progColor);
    I("pingText").textContent=format(uiData.pingStatus);
    I("jitText").textContent=format(uiData.jitterStatus);
}
function oscillate(){return 1+0.02*Math.sin(Date.now()/100);}
window.requestAnimationFrame=window.requestAnimationFrame||window.webkitRequestAnimationFrame||window.mozRequestAnimationFrame||window.msRequestAnimationFrame||(function(callback,element){setTimeout(callback,1000/60);});
function frame(){requestAnimationFrame(frame);updateUI();}
frame();
function initUI(){
    drawMeter(I("dlMeter"),0,meterBk,dlColor,0);
    I("dlText").textContent="";
    I("pingText").textContent="";
    I("jitText").textContent="";
    I("ip").textContent="";
}

var recommendStyles=`
.recommendationBox{padding:10px 15px;margin:10px 0;border-radius:5px;font-size:1.2em;text-align:center;display:inline-block;}
.recommended{background-color:#e6f7e6;border:2px solid #4CAF50;color:#2e7d32;}
.notRecommended{background-color:#fff6e6;border:2px solid #FF9800;color:#e65100;}
.recommendIcon{font-size:1.4em;vertical-align:middle;margin-right:5px;}
`;
if(!document.getElementById("recommendStyles")){
    var styleSheet=document.createElement("style");
    styleSheet.id="recommendStyles";
    styleSheet.innerHTML=recommendStyles;
    document.head.appendChild(styleSheet);
}
</script>

<style>
html,body{background:radial-gradient(circle at top,#0f172a,transparent 60%),radial-gradient(circle at bottom,#020617,#000) !important;color:#e5e7eb !important;font-family:Inter,Roboto,system-ui,sans-serif !important;}
h1,h3{color:#38bdf8 !important;text-shadow:0 0 12px rgba(56,189,248,.6);}
.footer{margin-top:40px;text-align:center;font-size:12px;opacity:.5;}
#testWrapper{background:rgba(15,23,42,.75);backdrop-filter:blur(14px);border-radius:22px;padding:24px;box-shadow:0 0 50px rgba(56,189,248,.25),inset 0 0 0 1px rgba(255,255,255,.06);}
#startStopBtn{border-color:#38bdf8 !important;color:#38bdf8 !important;border-radius:14px;font-weight:600;letter-spacing:.05em;box-shadow:0 0 18px rgba(56,189,248,.35);}
#startStopBtn:hover{background:rgba(56,189,248,.15);}
#startStopBtn.running{background:#ef4444 !important;border-color:#ef4444 !important;color:#fff !important;box-shadow:0 0 18px rgba(239,68,68,.6);}
#server{background:#020617;color:#e5e7eb;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:6px 10px;}
#currentTest{margin-top:12px;font-size:16px;}
#ip{opacity:.6;font-size:13px;}
#multi_results{background:rgba(2,6,23,.9);border-radius:14px;overflow:hidden;}
#multi_results th{background:rgba(56,189,248,.15);color:#38bdf8;}
#multi_results td{color:#e5e7eb;}
.recommended{background:rgba(34,197,94,.15) !important;border-color:#22c55e !important;color:#22c55e !important;}
.notRecommended{background:rgba(239,68,68,.15) !important;border-color:#ef4444 !important;color:#ef4444 !important;}
</style>
</head>
<body onload="initServers();">
<h1 style="text-align:center;margin-bottom:20px;">🚀 Premium IPTV Speed Test</h1>
<div id="loading" class="visible"><p id="message"><span class="loadCircle"></span>Секундочку...</p></div>
<div id="testWrapper" class="hidden">
    <div id="serverArea">
        <select id="server"></select>&nbsp;&nbsp;
        <div id="startStopBtn" onclick="startStop()"></div><br/><br/>
        <h3 id="currentTest"></h3>
    </div>
    <div id="test">
        <div class="testGroup">
            <div class="testArea2"><div class="testName">Ping</div><div id="pingText" class="meterText" style="color:#AA6060"></div><div class="unit">ms</div></div>
            <div class="testArea2"><div class="testName">Jitter</div><div id="jitText" class="meterText" style="color:#AA6060"></div><div class="unit">ms</div></div>
        </div>
        <div class="testGroup">
            <div class="testArea"><div class="testName">Download</div><canvas id="dlMeter" class="meter"></canvas><div id="dlText" class="meterText"></div><div class="unit">Mbps</div></div>
        </div>
        <div id="ipArea"><span id="ip"></span></div>
        <div id="shareArea" style="display:none"><h3>Share results</h3><p>Test ID: <span id="testId"></span></p><input type="text" value="" id="resultsURL" readonly="readonly" onclick="this.select();this.focus();this.select();document.execCommand('copy');alert('Link copied')"/><img src="" id="resultsImg" /></div>
    </div>
</div>
<div class="footer">© E-IPTV</div>
</body>
</html>
