  <script type="text/javascript">
    function I(i){return document.getElementById(i);}

    var s=new Speedtest();
    s.setParameter("telemetry_level","basic");

    function initServers(){
        var noServersAvailable=function(){ I("message").innerHTML="No servers available"; }
        var runServerSelect=function(){
            s.selectServer(function(server){
                if(server!=null){
                    I("loading").className="hidden";
                    for(var i=0;i<SPEEDTEST_SERVERS.length;i++){
                        if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
                        if(SPEEDTEST_SERVERS[i].serveropen==="YES"){
                            var option=document.createElement("option");
                            option.value=i;
                            option.textContent=SPEEDTEST_SERVERS[i].name;
                            I("server").appendChild(option);
                        }
                    }
                    var optionSeparator=document.createElement("option");
                    optionSeparator.disabled=true;
                    optionSeparator.textContent="─────────────────";
                    I("server").appendChild(optionSeparator);
                    var optionAllAvailable=document.createElement("option");
                    optionAllAvailable.value="all_available";
                    optionAllAvailable.textContent="Все доступные сервера";
                    optionAllAvailable.selected=true;
                    I("server").appendChild(optionAllAvailable);
                    var optionAllFull=document.createElement("option");
                    optionAllFull.value="all_with_filled";
                    optionAllFull.textContent="Все сервера";
                    I("server").appendChild(optionAllFull);
                    I("testWrapper").className="visible";
                    initUI();
                    setTimeout(function(){ startStop(); },1500);
                }else{ noServersAvailable(); }
            });
        }
        if(typeof SPEEDTEST_SERVERS==="string"){
            s.loadServerList(SPEEDTEST_SERVERS,function(servers){
                if(servers==null) noServersAvailable();
                else{ SPEEDTEST_SERVERS=servers; runServerSelect(); }
            });
        }else{
            s.addTestPoints(SPEEDTEST_SERVERS);
            runServerSelect();
        }
    }

    var meterBk=/Trident.*rv:(\d+\.\d+)/i.test(navigator.userAgent)?"#EAEAEA":"#80808040";
    var dlColor="#6060AA", progColor=meterBk;

    function drawMeter(c,amount,bk,fg,progress,prog){
        var ctx=c.getContext("2d");
        var dp=window.devicePixelRatio||1;
        var cw=c.clientWidth*dp, ch=c.clientHeight*dp;
        var sizScale=ch*0.0055;
        if(c.width!=cw||c.height!=ch){ c.width=cw; c.height=ch; }
        ctx.clearRect(0,0,cw,ch);
        ctx.beginPath();
        ctx.strokeStyle=bk;
        ctx.lineWidth=12*sizScale;
        ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,Math.PI*0.1);
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle=fg;
        ctx.lineWidth=12*sizScale;
        ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,amount*Math.PI*1.2-Math.PI*1.1);
        ctx.stroke();
        if(typeof progress!=="undefined"){
            ctx.fillStyle=prog;
            ctx.fillRect(c.width*0.3,c.height-16*sizScale,c.width*0.4*progress,4*sizScale);
        }
    }
    function mbpsToAmount(s){ return 1-(1/(Math.pow(1.3,Math.sqrt(s)))); }
    function format(d){ d=Number(d); if(d<10) return d.toFixed(2); if(d<100) return d.toFixed(1); return d.toFixed(0); }

    var uiData=null;
    var groupTestResults=[];
    var serversToTest=[];
    var currentServer=0;
    var stopAllTests=false;

    function startStop(){
        if(s.getState()==3){
            stopAllTests=true;
            serversToTest=[];
            s.abort();
            s.onupdate=null;
            s.onend=null;
            document.getElementById("currentTest").innerHTML="⛔ Тест прерван";
            uiData=null;
            I("startStopBtn").className="";
            I("server").disabled=false;
            initUI();
            return;
        }
        I("startStopBtn").className="running";
        I("shareArea").style.display="none";
        I("server").disabled=true;
        prepareResultTable();
        var selectedValue=I("server").value;
        if(selectedValue==="all_available"||selectedValue==="all_with_filled"){
            prepareMultiTest(selectedValue);
        }else{
            runSingleServerTest();
        }
    }

    function prepareResultTable(){
        var currentDateTime=new Date().toLocaleString();
        if(document.getElementById("generatedTime")){
            document.getElementById("generatedTime").innerHTML='Сгенерировано: '+currentDateTime;
        }else{
            var timeDiv=document.createElement("div");
            timeDiv.id="generatedTime";
            timeDiv.innerHTML='Сгенерировано: '+currentDateTime;
            timeDiv.style.marginTop="10px";
            timeDiv.style.fontSize="0.9em";
            timeDiv.style.color="#aaa";
            document.getElementById("test").appendChild(timeDiv);
        }
        if(!document.getElementById("multi_results")){
            document.getElementById("test").innerHTML+='<table id="multi_results"><tbody></tbody>for е-iptv';
        }
        document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML='<tr><th>Сервер</th><th>Ping</th><th>Jit</th><th>DL</th><th>Оценка</th></tr>';
    }

    function runSingleServerTest(){
        var serverIndex=parseInt(I("server").value);
        if(isNaN(serverIndex)) return;
        var serverObj=SPEEDTEST_SERVERS[serverIndex];
        document.getElementById("currentTest").innerHTML="Тестируется: "+serverObj.name;
        s.setSelectedServer(serverObj);
        s.onupdate=function(data){ uiData=data; };
        s.onend=function(aborted){
            I("startStopBtn").className="";
            I("server").disabled=false;
            updateUI(true);
            if(!aborted && uiData){
                appendResult(serverObj.name,serverObj.serveropen,uiData.dlStatus,uiData.pingStatus,uiData.jitterStatus);
                var recommended=isServerRecommended(uiData.jitterStatus,uiData.dlStatus,uiData.pingStatus);
                if(recommended){
                    document.getElementById("currentTest").innerHTML='<div class="recommendationBox recommended">👍 Рекомендован: <strong>'+serverObj.name+'</strong></div>';
                }else{
                    document.getElementById("currentTest").innerHTML='<div class="recommendationBox notRecommended">👎 Не рекомендован</div>';
                }
            }
        };
        s.start();
    }

    function prepareMultiTest(groupType){
        stopAllTests=false;
        groupTestResults=[];
        currentServer=0;
        serversToTest=[];
        for(var i=0;i<SPEEDTEST_SERVERS.length;i++){
            if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
            if(groupType==="all_available" && SPEEDTEST_SERVERS[i].serveropen!=="YES") continue;
            serversToTest.push(i);
        }
        if(serversToTest.length>0){
            currentServer=serversToTest[0];
            document.getElementById("currentTest").innerHTML="Тестируется: "+SPEEDTEST_SERVERS[currentServer].name+" (1 из "+serversToTest.length+")";
            s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
            startMultiTest();
        }else{
            I("startStopBtn").className="";
            I("server").disabled=false;
            I("currentTest").innerHTML="Нет серверов для тестирования";
        }
    }

    function startMultiTest(){
        if(s.getState()==3){ s.abort(); I("startStopBtn").className=""; I("server").disabled=false; return; }
        var testTimeout=null;
        var testCompleted=false;
        testTimeout=setTimeout(function(){
            if(!testCompleted && s.getState()==3){
                testCompleted=true;
                appendResult(SPEEDTEST_SERVERS[currentServer].name,SPEEDTEST_SERVERS[currentServer].serveropen,"Таймаут","Таймаут","Таймаут");
                groupTestResults.push({index:currentServer,name:SPEEDTEST_SERVERS[currentServer].name,serveropen:SPEEDTEST_SERVERS[currentServer].serveropen,dl:"Таймаут",ping:"Таймаут",jitter:"Таймаут"});
                if(s.getState()==3) s.abort();
                setTimeout(function(){ if(!stopAllTests) moveToNextServer(); },500);
            }
        },30000);
        s.onupdate=function(data){ uiData=data; };
        s.onend=function(aborted){
            clearTimeout(testTimeout);
            if(testCompleted) return;
            testCompleted=true;
            if(stopAllTests){
                appendResult(SPEEDTEST_SERVERS[currentServer].name,SPEEDTEST_SERVERS[currentServer].serveropen,"⛔ STOP","⛔ STOP","⛔ STOP");
                I("startStopBtn").className=""; I("server").disabled=false;
                document.getElementById("currentTest").innerHTML="⛔ Тест прерван";
                return;
            }
            if(!uiData) uiData={dlStatus:0,pingStatus:999,jitterStatus:999};
            var dlValue=(uiData.dlStatus>0)?uiData.dlStatus:0;
            var pingValue=(uiData.pingStatus<999)?uiData.pingStatus:0;
            var jitterValue=(uiData.jitterStatus<999)?uiData.jitterStatus:0;
            if(aborted && dlValue===0){
                appendResult(SPEEDTEST_SERVERS[currentServer].name,SPEEDTEST_SERVERS[currentServer].serveropen,"Таймаут","Таймаут","Таймаут");
                groupTestResults.push({index:currentServer,name:SPEEDTEST_SERVERS[currentServer].name,serveropen:SPEEDTEST_SERVERS[currentServer].serveropen,dl:"Таймаут",ping:"Таймаут",jitter:"Таймаут"});
            }else{
                appendResult(SPEEDTEST_SERVERS[currentServer].name,SPEEDTEST_SERVERS[currentServer].serveropen,dlValue,pingValue,jitterValue);
                groupTestResults.push({index:currentServer,name:SPEEDTEST_SERVERS[currentServer].name,serveropen:SPEEDTEST_SERVERS[currentServer].serveropen,dl:dlValue,ping:pingValue,jitter:jitterValue});
            }
            moveToNextServer();
        };
        s.start();
    }

    function appendResult(server,serveropen,dl,ping,jitter){
        var statusIcon=getServerRating(jitter,dl,ping);
        var pingDisplay=ping;
        if(ping==="Таймаут"||ping==="⛔ STOP"){ pingDisplay=ping; }
        else if(typeof ping==='number'){ pingDisplay=format(ping)+" ms"; }
        var jitterDisplay=(typeof jitter==='number')?jitter.toFixed(2)+" ms":jitter;
        var dlDisplay=(typeof dl==='number')?dl.toFixed(1)+" Mbps":dl;
        document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML+= 
            '<tr><td>'+server+'</td><td>'+pingDisplay+'</td><td>'+jitterDisplay+'</td><td>'+dlDisplay+'</td><td>'+statusIcon+'</td></tr>';
    }

    // ========== ФУНКЦИИ РЕЙТИНГА (РАБОЧИЕ ИЗ СТАРОГО КОДА) ==========
    function isBadValue(v){
        return v===null||v===undefined||v===""||v==="Таймаут"||v==="⛔ STOP"||v==="Fail"||isNaN(Number(v));
    }
    function parseValues(jitter,dl,ping){
        if(isBadValue(jitter)||isBadValue(dl)||isBadValue(ping)) return null;
        return {jitter:Number(jitter),dl:Number(dl),ping:Number(ping)};
    }
    function calculateIPTVScore(jitter,dl,ping){
        var data=parseValues(jitter,dl,ping);
        if(!data) return {valid:false,score:0};
        var j=data.jitter, d=data.dl, p=data.ping;
        var score=100;
        if(j<=2) score+=25;
        else if(j<=5) score+=18;
        else if(j<=10) score+=5;
        else if(j<=15) score-=15;
        else if(j<=20) score-=40;
        else if(j<=30) score-=70;
        else score-=100;
        if(p<=15) score+=15;
        else if(p<=30) score+=12;
        else if(p<=50) score+=10;
        else if(p<=70) score+=0;
        else if(p<=90) score-=20;
        else if(p<=120) score-=35;
        else if(p<=180) score-=55;
        else score-=80;
        if(d>=100) score+=10;
        else if(d>=50) score+=8;
        else if(d>=30) score+=5;
        else if(d>=20) score+=0;
        else if(d>=15) score-=10;
        else if(d>=10) score-=25;
        else score-=50;
        if(j>15) score-=20;
        if(j>25) score-=30;
        if(p>100 && j>10) score-=20;
        if(p>150) score-=20;
        if(d<15) score-=20;
        score=Math.max(0,Math.min(100,score));
        return {valid:true,score:score,jitter:j,ping:p,dl:d};
    }
    function getServerRating(jitter,dl,ping){
        var res=calculateIPTVScore(jitter,dl,ping);
        if(!res.valid) return "✖︎";
        var score=res.score;
        if(score>=90 && res.ping<=50 && res.jitter<=4) return "❤︎";
        if(res.ping>80){
            if(score>=55) return "✔︎✔︎";
            if(score>=35) return "✔︎";
            return "✖︎";
        }
        if(score>=75) return "✔︎✔︎✔︎";
        if(score>=55) return "✔︎✔︎";
        if(score>=35) return "✔︎";
        return "✖︎";
    }
    function isServerRecommended(jitter,dl,ping){
        var res=calculateIPTVScore(jitter,dl,ping);
        if(!res.valid) return false;
        if(res.jitter>20) return false;
        if(res.ping>180) return false;
        if(res.dl<15) return false;
        return res.score>=55;
    }

    // ========== ФУНКЦИЯ ПОИСКА ЛУЧШЕГО СЕРВЕРА (С ПРИОРИТЕТОМ) ==========
	function findBestServer(results) {
		if (!results || results.length === 0) return null;
		
		var priority = ["❤︎", "✔︎✔︎✔︎", "✔︎✔︎", "✔︎"];
		
		for (var p = 0; p < priority.length; p++) {
			var targetRating = priority[p];
			var best = null;
			var bestScore = -1;
			var bestJitter = Infinity;
			
			for (var i = 0; i < results.length; i++) {
				var r = results[i];
				
				// Принудительно извлекаем числа из любых полей
				var dlNum = (typeof r.dl === 'number') ? r.dl : parseFloat(r.dl);
				var pingNum = (typeof r.ping === 'number') ? r.ping : parseFloat(r.ping);
				var jitterNum = (typeof r.jitter === 'number') ? r.jitter : parseFloat(r.jitter);
				
				// Если не получилось число — пропускаем
				if (isNaN(dlNum) || isNaN(pingNum) || isNaN(jitterNum)) continue;
				
				var rating = getServerRating(jitterNum, dlNum, pingNum);
				if (rating !== targetRating) continue;
				
				var calc = calculateIPTVScore(jitterNum, dlNum, pingNum);
				if (!calc.valid) continue;
				
				var score = calc.score;
				
				if (best === null || 
					score > bestScore || 
					(Math.abs(score - bestScore) < 0.01 && jitterNum < bestJitter)) {
					best = {
						name: r.name,
						dl: dlNum,
						ping: pingNum,
						jitter: jitterNum,
						rating: rating,
						score: score
					};
					bestScore = score;
					bestJitter = jitterNum;
				}
			}
			
			if (best !== null) {
				return best;
			}
		}
		
		return null;
	}

    function moveToNextServer(){
        var currentIndex=serversToTest.indexOf(currentServer);
        if(currentIndex<serversToTest.length-1){
            currentServer=serversToTest[currentIndex+1];
            document.getElementById("currentTest").innerHTML="Тестируется: "+SPEEDTEST_SERVERS[currentServer].name+" ("+(currentIndex+2)+" из "+serversToTest.length+")";
            s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
            setTimeout(function(){ startMultiTest(); },500);
        }else{
            I("startStopBtn").className="";
            I("server").disabled=false;
            var bestServer=findBestServer(groupTestResults);
            if(bestServer){
                var explanation="";
                var rating=bestServer.rating;
                if(rating==="❤︎") explanation="❤️ Отличный сервер: джиттер "+bestServer.jitter.toFixed(2)+" ms, ping "+bestServer.ping.toFixed(0)+" ms, скорость "+bestServer.dl.toFixed(1)+" Mbps";
                else if(rating==="✔︎✔︎✔︎") explanation="✔︎✔︎✔︎ Хороший баланс: джиттер "+bestServer.jitter.toFixed(2)+" ms, ping "+bestServer.ping.toFixed(0)+" ms, скорость "+bestServer.dl.toFixed(1)+" Mbps";
                else if(rating==="✔︎✔︎") explanation="✔︎✔︎ Среднее качество: джиттер "+bestServer.jitter.toFixed(2)+" ms, возможны небольшие задержки";
                else if(rating==="✔︎") explanation="✔︎ Минимально пригодный сервер (скорость "+bestServer.dl.toFixed(1)+" Mbps)";
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox recommended">➡︎ Рекомендован: <strong>'+bestServer.name+'</strong><br><small>'+explanation+'</small></div>';
            }else{
                document.getElementById("currentTest").innerHTML='<div class="recommendationBox notRecommended">✖︎ Нет подходящих серверов. Обратитесь к администратору.</div>';
            }
        }
    }

    function updateUI(forced){
        if(!forced&&s.getState()!=3) return;
        if(uiData==null) return;
        var status=uiData.testState;
        I("ip").textContent=uiData.clientIp;
        I("dlText").textContent=(status==1&&uiData.dlStatus==0)?"...":format(uiData.dlStatus);
        drawMeter(I("dlMeter"),mbpsToAmount(Number(uiData.dlStatus*(status==1?oscillate():1))),meterBk,dlColor,Number(uiData.dlProgress),progColor);
        I("pingText").textContent=format(uiData.pingStatus);
        I("jitText").textContent=format(uiData.jitterStatus);
    }
    function oscillate(){ return 1+0.02*Math.sin(Date.now()/100); }
    window.requestAnimationFrame=window.requestAnimationFrame||function(cb){ setTimeout(cb,1000/60); };
    function frame(){ requestAnimationFrame(frame); updateUI(); }
    frame();
    function initUI(){
        drawMeter(I("dlMeter"),0,meterBk,dlColor,0);
        I("dlText").textContent="";
        I("pingText").textContent="";
        I("jitText").textContent="";
        I("ip").textContent="";
    }

    document.addEventListener('DOMContentLoaded', function(){ setTimeout(initServers, 100); });
  </script>
</head>
<body>
<h1 style="text-align:center;">🚀 Premium IPTV Speed Test</h1>
<div id="loading" class="visible"><p id="message"><span class="loadCircle"></span>Секундочку...</p></div>
<div id="testWrapper" class="hidden">
    <div id="serverArea">
        <select id="server"></select>&nbsp;&nbsp;
        <div id="startStopBtn" onclick="startStop()"></div><br/>
        <h3 id="currentTest"></h3>
    </div>
    <div id="test">
        <div class="testGroup">
            <div class="testArea2"><div class="testName">Ping</div><div id="pingText" class="meterText" style="color:#AA6060"></div><div class="unit">ms</div></div>
            <div class="testArea2"><div class="testName">Jitter</div><div id="jitText" class="meterText" style="color:#AA6060"></div><div class="unit">ms</div></div>
        </div>
        <div class="testGroup">
            <div class="testArea"><div class="testName">Download</div><canvas id="dlMeter" class="meter"></canvas><div id="dlText" class="meterText"></div><div class="unit">Mbps</div></div>
        </div>
        <div id="ipArea"><span id="ip"></span></div>
        <div id="shareArea" style="display:none"><h3>Share results</h3><p>Test ID: <span id="testId"></span></p><input type="text" id="resultsURL" readonly onclick="this.select();document.execCommand('copy');alert('Link copied')"/><img id="resultsImg" src=""/></div>
    </div>
</div>
<div class="footer">© E-IPTV</div>
</body>
</html>
