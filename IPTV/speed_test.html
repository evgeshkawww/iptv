  </style>
  <script type="text/javascript">
    // ----- вспомогательные функции рейтинга (IPTV оценка) -----
    function isBadValue(v) {
        return v === null || v === undefined || v === "" || v === "Таймаут" || v === "⛔ STOP" || v === "Fail" || isNaN(Number(v));
    }
    function parseValues(jitter, dl, ping) {
        if (isBadValue(jitter) || isBadValue(dl) || isBadValue(ping)) return null;
        return { jitter: Number(jitter), dl: Number(dl), ping: Number(ping) };
    }
	function calculateIPTVScore(jitter, dl, ping) {
		const data = parseValues(jitter, dl, ping);
		if (!data) return { valid: false, score: 0 };
		
		let j = data.jitter;
		let d = data.dl;
		let p = data.ping;
		
		let score = 100;
		
		// Jitter (главный параметр) - максимальный вес
		if (j <= 2) score += 30;
		else if (j <= 5) score += 20;
		else if (j <= 10) score += 5;
		else if (j <= 15) score -= 10;
		else if (j <= 20) score -= 30;
		else if (j <= 30) score -= 60;
		else score -= 100;
		
		// Ping (важно для zapping)
		if (p <= 30) score += 20;
		else if (p <= 50) score += 15;
		else if (p <= 70) score += 5;
		else if (p <= 90) score += 0;
		else if (p <= 120) score -= 15;
		else if (p <= 180) score -= 35;
		else score -= 60;
		
		// Speed (достаточно 30-50)
		if (d >= 100) score += 10;
		else if (d >= 50) score += 8;
		else if (d >= 30) score += 5;
		else if (d >= 20) score += 0;
		else if (d >= 15) score -= 10;
		else if (d >= 10) score -= 25;
		else score -= 50;
		
		// Бонус за отличное сочетание
		if (j <= 3 && p <= 40 && d >= 50) score += 15;
		if (j <= 6 && p <= 60 && d >= 30) score += 5;
		
		score = Math.max(0, Math.min(100, score));
		return { valid: true, score, jitter: j, ping: p, dl: d };
	}
    
	function getServerRating(jitter, dl, ping) {
		const res = calculateIPTVScore(jitter, dl, ping);
		if (!res.valid) return "✖︎";
		const score = res.score;
		
		// ❤︎ - идеал: score >= 85
		if (score >= 85) return "❤︎";
		
		// ✔︎✔︎✔︎ - отлично: score >= 70
		if (score >= 70) return "✔︎✔︎✔︎";
		
		// ✔︎✔︎ - хорошо: score >= 50
		if (score >= 50) return "✔︎✔︎";
		
		// ✔︎ - удовлетворительно: score >= 35
		if (score >= 35) return "✔︎";
		
		return "✖︎";
	}
    
	// === НОВАЯ ЛОГИКА РЕКОМЕНДАЦИИ ===
	// Приоритет: ❤︎ → ✔︎✔︎✔︎ → ✔︎✔︎ → ✔︎
	function findBestServerForRecommendation(results) {
		if (!results || results.length === 0) return null;
		
		// Группируем по рейтингу
		const groups = {
			heart: [],      // ❤︎
			triple: [],     // ✔︎✔︎✔︎
			double: [],     // ✔︎✔︎
			single: []      // ✔︎
		};
		
		for (let r of results) {
			const rating = getServerRating(r.jitter, r.dl, r.ping);
			const score = calculateIPTVScore(r.jitter, r.dl, r.ping).score;
			const serverData = {
				...r,
				score: score,
				jitterVal: Number(r.jitter),
				pingVal: Number(r.ping),
				dlVal: Number(r.dl),
				rating: rating
			};
			
			if (rating === "❤︎") groups.heart.push(serverData);
			else if (rating === "✔︎✔︎✔︎") groups.triple.push(serverData);
			else if (rating === "✔︎✔︎") groups.double.push(serverData);
			else if (rating === "✔︎") groups.single.push(serverData);
		}
		
		// Сортировка внутри группы: по score (убывание), потом по jitter (возрастание), потом по ping
		const sortByQuality = (arr) => {
			arr.sort((a,b) => {
				if (a.score !== b.score) return b.score - a.score;
				if (a.jitterVal !== b.jitterVal) return a.jitterVal - b.jitterVal;
				if (a.pingVal !== b.pingVal) return a.pingVal - b.pingVal;
				return b.dlVal - a.dlVal;
			});
		};
		
		// Выбираем первую НЕПУСТУЮ группу по приоритету
		if (groups.heart.length > 0) {
			sortByQuality(groups.heart);
			return { server: groups.heart[0], type: "heart" };
		}
		if (groups.triple.length > 0) {
			sortByQuality(groups.triple);
			return { server: groups.triple[0], type: "triple" };
		}
		if (groups.double.length > 0) {
			sortByQuality(groups.double);
			return { server: groups.double[0], type: "double" };
		}
		if (groups.single.length > 0) {
			sortByQuality(groups.single);
			return { server: groups.single[0], type: "single" };
		}
		
		return null; // все кресты
	}
    
    function isServerRecommended(jitter, dl, ping) { 
        const rating = getServerRating(jitter, dl, ping);
        return rating === "❤︎";
    }
    
    // --- Глобальные переменные ---
    var s = new Speedtest();
    s.setParameter("telemetry_level","basic");
    var uiData = null;
    var groupTestResults = [];
    var serversToTest = [];
    var currentServer = 0;
    var stopAllTests = false;
    
    function I(id){ return document.getElementById(id); }
    function format(d){ d=Number(d); if(d<10) return d.toFixed(2); if(d<100) return d.toFixed(1); return d.toFixed(0); }
    function mbpsToAmount(s){ return 1-(1/(Math.pow(1.3,Math.sqrt(s)))); }
    var meterBk = /Trident.*rv:(\d+\.\d+)/i.test(navigator.userAgent)?"#EAEAEA":"#80808040";
    var dlColor="#6060AA", progColor=meterBk;
    
    function drawMeter(c,amount,bk,fg,progress,prog){
        var ctx=c.getContext("2d");
        var dp=window.devicePixelRatio||1;
        var cw=c.clientWidth*dp, ch=c.clientHeight*dp;
        var sizScale=ch*0.0055;
        if(c.width!=cw||c.height!=ch){ c.width=cw; c.height=ch; }
        ctx.clearRect(0,0,cw,ch);
        ctx.beginPath();
        ctx.strokeStyle=bk;
        ctx.lineWidth=12*sizScale;
        ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,Math.PI*0.1);
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle=fg;
        ctx.lineWidth=12*sizScale;
        ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,amount*Math.PI*1.2-Math.PI*1.1);
        ctx.stroke();
        if(typeof progress !== "undefined"){
            ctx.fillStyle=prog;
            ctx.fillRect(c.width*0.3,c.height-16*sizScale,c.width*0.4*progress,4*sizScale);
        }
    }
    function oscillate(){ return 1+0.02*Math.sin(Date.now()/100); }
    function updateUI(forced){
        if(!forced&&s.getState()!=3) return;
        if(uiData==null) return;
        var status=uiData.testState;
        I("ip").textContent=uiData.clientIp;
        I("dlText").textContent=(status==1&&uiData.dlStatus==0)?"...":format(uiData.dlStatus);
        drawMeter(I("dlMeter"),mbpsToAmount(Number(uiData.dlStatus*(status==1?oscillate():1))),meterBk,dlColor,Number(uiData.dlProgress),progColor);
        I("pingText").textContent=format(uiData.pingStatus);
        I("jitText").textContent=format(uiData.jitterStatus);
    }
    function frame(){ requestAnimationFrame(frame); updateUI(); }
    frame();
    function initUI(){
        drawMeter(I("dlMeter"),0,meterBk,dlColor,0);
        I("dlText").textContent="";
        I("pingText").textContent="";
        I("jitText").textContent="";
        I("ip").textContent="";
    }
    
    function prepareResultTable(){
        let dt = new Date().toLocaleString();
        if(!document.getElementById("generatedTime")){
            var timeDiv = document.createElement("div");
            timeDiv.id = "generatedTime";
            timeDiv.innerHTML = 'Сгенерировано: ' + dt;
            timeDiv.style.marginTop = "10px";
            timeDiv.style.fontSize = "0.9em";
            timeDiv.style.color = "#aaa";
            document.getElementById("test").appendChild(timeDiv);
        } else { I("generatedTime").innerHTML = 'Сгенерировано: ' + dt; }
        if(!document.getElementById("multi_results")){
            document.getElementById("test").innerHTML += '<table id="multi_results"><tbody></tbody></table>';
        }
        document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML = 
            '<tr><th>Сервер</th><th title="Пинг, мс">Ping</th><th title="Джиттер, мс">Jit</th><th title="Скорость, Мбит/с">DL</th><th>Оценка</th></tr>';
    }
    
    function appendResult(server, serveropen, dl, ping, jitter){
        let pingDisplay = (ping === "Таймаут" || ping === "⛔ STOP") ? ping : (typeof ping === 'number' ? format(ping)+" ms" : ping);
        let rating = "✖︎";
        if(dl !== "Таймаут" && dl !== "⛔ STOP" && typeof dl === 'number') rating = getServerRating(jitter, dl, ping);
        let jitterDisplay = (typeof jitter === 'number') ? jitter.toFixed(2)+" ms" : jitter;
        let dlDisplay = (typeof dl === 'number') ? dl.toFixed(1)+" Mbps" : dl;
        document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML += 
            `<tr><td>${server}</td><td>${pingDisplay}</td><td>${jitterDisplay}</td><td>${dlDisplay}</td><td>${rating}</td></tr>`;
    }
    
    function startMultiTest(){
        if (s.getState() == 3) { s.abort(); I("startStopBtn").className = ""; I("server").disabled = false; return; }
        let testTimeout = setTimeout(function(){
            if(!testCompleted && s.getState()==3){
                testCompleted=true;
                appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, "Таймаут", "Таймаут", "Таймаут");
                groupTestResults.push({ index: currentServer, name: SPEEDTEST_SERVERS[currentServer].name, serveropen: SPEEDTEST_SERVERS[currentServer].serveropen, dl: "Таймаут", ping: "Таймаут", jitter: "Таймаут" });
                if(s.getState()==3) s.abort();
                setTimeout(()=>{ if(!stopAllTests) moveToNextServer(); }, 500);
            }
        }, 30000);
        let testCompleted = false;
        s.onupdate = function(data){ uiData = data; };
        s.onend = function(aborted){
            clearTimeout(testTimeout);
            if(testCompleted) return;
            testCompleted = true;
            if(stopAllTests){
                appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, "⛔ STOP", "⛔ STOP", "⛔ STOP");
                I("startStopBtn").className = ""; I("server").disabled = false; 
                I("currentTest").innerHTML = "⛔ Тест прерван";
                return;
            }
            let dlVal = (uiData && uiData.dlStatus>0) ? uiData.dlStatus : 0;
            let pingVal = (uiData && uiData.pingStatus<999) ? uiData.pingStatus : 0;
            let jitterVal = (uiData && uiData.jitterStatus<999) ? uiData.jitterStatus : 0;
            if(aborted && dlVal===0){
                appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, "Таймаут", "Таймаут", "Таймаут");
                groupTestResults.push({ index: currentServer, name: SPEEDTEST_SERVERS[currentServer].name, serveropen: SPEEDTEST_SERVERS[currentServer].serveropen, dl: "Таймаут", ping: "Таймаут", jitter: "Таймаут" });
            } else {
                appendResult(SPEEDTEST_SERVERS[currentServer].name, SPEEDTEST_SERVERS[currentServer].serveropen, dlVal, pingVal, jitterVal);
                groupTestResults.push({ index: currentServer, name: SPEEDTEST_SERVERS[currentServer].name, serveropen: SPEEDTEST_SERVERS[currentServer].serveropen, dl: dlVal, ping: pingVal, jitter: jitterVal });
            }
            moveToNextServer();
        };
        s.start();
    }
    
	function moveToNextServer(){
		let idx = serversToTest.indexOf(currentServer);
		if(idx < serversToTest.length-1){
			currentServer = serversToTest[idx+1];
			I("currentTest").innerHTML = "Тестируется: " + SPEEDTEST_SERVERS[currentServer].name + " ("+(idx+2)+" из "+serversToTest.length+")";
			s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
			setTimeout(()=> startMultiTest(), 500);
		} else {
			I("startStopBtn").className = "";
			I("server").disabled = false;
			
			// Собираем валидные результаты
			let validResults = [];
			for(let res of groupTestResults){
				if(res.dl !== "Таймаут" && res.dl !== "⛔ STOP" && typeof res.dl === 'number'){
					validResults.push({ name: res.name, dl: res.dl, ping: res.ping, jitter: res.jitter });
				}
			}
			
			let best = findBestServerForRecommendation(validResults);
			
			if (best) {
				let srv = best.server;
				let expl = "";
				
				switch(best.type) {
					case "heart":
						expl = `❤️ Отличный сервер: джиттер ${srv.jitterVal.toFixed(2)} ms, ping ${srv.pingVal.toFixed(0)} ms, скорость ${srv.dlVal.toFixed(1)} Mbps`;
						break;
					case "triple":
						expl = `✔︎✔︎✔︎ Хороший баланс: джиттер ${srv.jitterVal.toFixed(2)} ms, ping ${srv.pingVal.toFixed(0)} ms, скорость ${srv.dlVal.toFixed(1)} Mbps`;
						break;
					case "double":
						expl = `✔︎✔︎ Среднее качество: джиттер ${srv.jitterVal.toFixed(2)} ms, возможны небольшие задержки`;
						break;
					case "single":
						expl = `✔︎ Минимально пригодный сервер (скорость ${srv.dlVal.toFixed(1)} Mbps)`;
						break;
				}
				I("currentTest").innerHTML = `<div class="recommendationBox recommended">➡︎ Рекомендован: <strong>${srv.name}</strong><br><small>${expl}</small></div>`;
			} else {
				I("currentTest").innerHTML = '<div class="recommendationBox notRecommended">✖︎ Нет доступных серверов. Обратитесь к администратору.</div>';
			}
		}
	}  
    
    function prepareMultiTest(groupType){
        stopAllTests = false;
        groupTestResults = [];
        serversToTest = [];
        for(let i=0;i<SPEEDTEST_SERVERS.length;i++){
            if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
            if(groupType === "all_available" && SPEEDTEST_SERVERS[i].serveropen !== "YES") continue;
            serversToTest.push(i);
        }
        if(serversToTest.length > 0){
            currentServer = serversToTest[0];
            I("currentTest").innerHTML = "Тестируется: " + SPEEDTEST_SERVERS[currentServer].name + " (1 из "+serversToTest.length+")";
            s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
            startMultiTest();
        } else {
            I("startStopBtn").className="";
            I("server").disabled=false;
            I("currentTest").innerHTML = "Нет серверов для тестирования";
        }
    }
    
    function runSingleServerTest(){
        let serverIndex = parseInt(I("server").value);
        if(isNaN(serverIndex)) return;
        let serverObj = SPEEDTEST_SERVERS[serverIndex];
        I("currentTest").innerHTML = "Тестируется: " + serverObj.name;
        s.setSelectedServer(serverObj);
        s.onupdate = function(data){ uiData=data; };
        s.onend = function(aborted){
            I("startStopBtn").className = "";
            I("server").disabled = false;
            if(!aborted && uiData){
                appendResult(serverObj.name, serverObj.serveropen, uiData.dlStatus, uiData.pingStatus, uiData.jitterStatus);
                let recommended = isServerRecommended(uiData.jitterStatus, uiData.dlStatus, uiData.pingStatus);
                if(recommended){
                    I("currentTest").innerHTML = '<div class="recommendationBox recommended">👍 Рекомендован: <strong>'+serverObj.name+'</strong></div>';
                } else {
                    I("currentTest").innerHTML = '<div class="recommendationBox notRecommended">👎 Не рекомендован</div>';
                }
            } else if(aborted){
                I("currentTest").innerHTML = "⛔ Тест прерван";
            }
        };
        s.start();
    }
    
    function startStop(){
        if(s.getState() == 3){
            stopAllTests = true;
            serversToTest = [];
            s.abort();
            s.onupdate = null; s.onend = null;
            I("currentTest").innerHTML = "⛔ Тест прерван";
            I("startStopBtn").className = "";
            I("server").disabled = false;
            initUI();
            return;
        }
        I("startStopBtn").className = "running";
        I("shareArea").style.display = "none";
        I("server").disabled = true;
        prepareResultTable();
        let selectedValue = I("server").value;
        if(selectedValue === "all_available" || selectedValue === "all_with_filled"){
            prepareMultiTest(selectedValue);
        } else {
            runSingleServerTest();
        }
    }
    
    function initServers(){
        function noServersAvailable(){ I("message").innerHTML="No servers available"; }
        function runServerSelect(){
            s.selectServer(function(server){
                if(server!=null){
                    I("loading").className="hidden";
                    for(let i=0;i<SPEEDTEST_SERVERS.length;i++){
                        if(SPEEDTEST_SERVERS[i].pingT == -1) continue;
                        if(SPEEDTEST_SERVERS[i].serveropen === "YES"){
                            let opt = document.createElement("option");
                            opt.value = i;
                            opt.textContent = SPEEDTEST_SERVERS[i].name;
                            I("server").appendChild(opt);
                        }
                    }
                    let sep = document.createElement("option");
                    sep.disabled = true; sep.textContent = "─────────────────";
                    I("server").appendChild(sep);
                    let optAllAvail = document.createElement("option");
                    optAllAvail.value = "all_available";
                    optAllAvail.textContent = "Все доступные сервера";
                    optAllAvail.selected = true;
                    I("server").appendChild(optAllAvail);
                    let optAllFull = document.createElement("option");
                    optAllFull.value = "all_with_filled";
                    optAllFull.textContent = "Все сервера";
                    I("server").appendChild(optAllFull);
                    I("testWrapper").className="visible";
                    initUI();
                    setTimeout(()=> startStop(), 1500);
                } else { noServersAvailable(); }
            });
        }
        if(typeof SPEEDTEST_SERVERS === "string"){
            s.loadServerList(SPEEDTEST_SERVERS, function(servers){
                if(servers==null) noServersAvailable();
                else { SPEEDTEST_SERVERS=servers; runServerSelect(); }
            });
        } else {
            s.addTestPoints(SPEEDTEST_SERVERS);
            runServerSelect();
        }
    }
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(initServers, 100); });
  </script>
</head>
<body>
<h1 style="text-align:center;">🚀 Premium IPTV Speed Test</h1>
<div id="loading" class="visible"><p id="message"><span class="loadCircle"></span>Секундочку...</p></div>
<div id="testWrapper" class="hidden">
    <div id="serverArea">
        <select id="server"></select>&nbsp;&nbsp;
        <div id="startStopBtn" onclick="startStop()"></div><br/>
        <h3 id="currentTest"></h3>
    </div>
    <div id="test">
        <div class="testGroup">
            <div class="testArea2"><div class="testName">Ping</div><div id="pingText" class="meterText" style="color:#AA6060"></div><div class="unit">ms</div></div>
            <div class="testArea2"><div class="testName">Jitter</div><div id="jitText" class="meterText" style="color:#AA6060"></div><div class="unit">ms</div></div>
        </div>
        <div class="testGroup">
            <div class="testArea"><div class="testName">Download</div><canvas id="dlMeter" class="meter"></canvas><div id="dlText" class="meterText"></div><div class="unit">Mbps</div></div>
        </div>
        <div id="ipArea"><span id="ip"></span></div>
        <div id="shareArea" style="display:none"><h3>Share results</h3><p>Test ID: <span id="testId"></span></p><input type="text" id="resultsURL" readonly onclick="this.select();document.execCommand('copy');alert('Link copied')"/><img id="resultsImg" src=""/></div>
    </div>
</div>
<div class="footer">© E-IPTV</div>
</body>
</html>
