//INITIALIZE SPEEDTEST
var s=new Speedtest(); //create speedtest object
s.setParameter("telemetry_level","basic"); //enable telemetry

//SERVER AUTO SELECTION
function initServers(){
    var noServersAvailable=function(){
        I("message").innerHTML="No servers available";
    }
    var runServerSelect=function(){
        s.selectServer(function(server){
            if(server!=null){ //at least 1 server is available
                I("loading").className="hidden"; //hide loading message
                
                // =====================================================
                // 1. СНАЧАЛА добавляем отдельные серверы (только YES)
                // =====================================================
                for (var i = 0; i < SPEEDTEST_SERVERS.length; i++) {

                    if (SPEEDTEST_SERVERS[i].pingT == -1) continue;

                    // ✅ Добавляем ТОЛЬКО серверы с serveropen = "YES"
                    if (SPEEDTEST_SERVERS[i].serveropen === "YES") {
                        var option = document.createElement("option");
                        option.value = i;
                        option.textContent = SPEEDTEST_SERVERS[i].name;
                        I("server").appendChild(option);
                    }
                    
                    // ❌ Серверы с serveropen = "NO" просто пропускаем
                }
                
                // =====================================================
                // 2. ПОТОМ добавляем разделитель
                // =====================================================
                var optionSeparator = document.createElement("option");
                optionSeparator.disabled = true;
                optionSeparator.textContent = "─────────────────";
                I("server").appendChild(optionSeparator);
                
                // =====================================================
                // 3. В САМОМ КОНЦЕ добавляем опции для группового теста
                // =====================================================
                // Добавляем опцию для тестирования всех доступных серверов
                var optionAllAvailable = document.createElement("option");
                optionAllAvailable.value = "all_available";
                optionAllAvailable.textContent = "Все доступные сервера";
                optionAllAvailable.selected = true; // Устанавливаем эту опцию как выбранную по умолчанию
                I("server").appendChild(optionAllAvailable);
                
                // Добавляем опцию для тестирования всех серверов, включая заполненные
                var optionAllFull = document.createElement("option");
                optionAllFull.value = "all_with_filled";
                optionAllFull.textContent = "Все сервера";
                I("server").appendChild(optionAllFull);
                
                //show test UI
                I("testWrapper").className="visible";
                initUI();

                setTimeout(function(){
                    startStop();
                },1500);
            }else{ //no servers are available, the test cannot proceed
                noServersAvailable();
            }
        });
    }
    if(typeof SPEEDTEST_SERVERS === "string"){
        //need to fetch list of servers from specified URL
        s.loadServerList(SPEEDTEST_SERVERS,function(servers){
            if(servers==null){ //failed to load server list
                noServersAvailable();
            }else{ //server list loaded
                SPEEDTEST_SERVERS=servers;
                runServerSelect();
            }
        });
    }else{
        //hardcoded server list
        s.addTestPoints(SPEEDTEST_SERVERS);
        runServerSelect();
    }
}

//CODE FOR GAUGES
function drawMeter(c,amount,bk,fg,progress,prog){
	var ctx=c.getContext("2d");
	var dp=window.devicePixelRatio||1;
	var cw=c.clientWidth*dp, ch=c.clientHeight*dp;
	var sizScale=ch*0.0055;
	if(c.width==cw&&c.height==ch){
		ctx.clearRect(0,0,cw,ch);
	}else{
		c.width=cw;
		c.height=ch;
	}
	ctx.beginPath();
	ctx.strokeStyle=bk;
	ctx.lineWidth=12*sizScale;
	ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,Math.PI*0.1);
	ctx.stroke();
	ctx.beginPath();
	ctx.strokeStyle=fg;
	ctx.lineWidth=12*sizScale;
	ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,amount*Math.PI*1.2-Math.PI*1.1);
	ctx.stroke();
	if(typeof progress !== "undefined"){
		ctx.fillStyle=prog;
		ctx.fillRect(c.width*0.3,c.height-16*sizScale,c.width*0.4*progress,4*sizScale);
	}
}
function mbpsToAmount(s){
	return 1-(1/(Math.pow(1.3,Math.sqrt(s))));
}
function format(d){
    d=Number(d);
    if(d<10) return d.toFixed(2);
    if(d<100) return d.toFixed(1);
    return d.toFixed(0);
}

//UI CODE
var uiData=null;
function startStop(){
	if (s.getState() == 3) {

		stopAllTests = true;
		serversToTest = [];
		s.abort();

		document.getElementById("currentTest").innerHTML = "⛔ Тест прерван";
		uiData = null;
		I("startStopBtn").className = "";
		I("server").disabled = false;
		initUI();
		return;
	}else{
		//test is not running, begin
		I("startStopBtn").className="running";
		I("shareArea").style.display="none";
		I("server").disabled=true;
        
        // Подготавливаем таблицу результатов для любого типа теста
        prepareResultTable();
        
        // Проверяем, выбрана ли группа серверов
        var serverSelect = I("server");
        var selectedValue = serverSelect.value;
        
        if (selectedValue === "all_available" || selectedValue === "all_with_filled") {
            // Запускаем тестирование группы серверов с использованием существующего функционала
            prepareMultiTest(selectedValue);
        } else {
            // Обычное тестирование одного сервера
            runSingleServerTest();
        }
	}
}

        document.getElementById("generatedTime").innerHTML = 'Сгенерировано: ' + currentDateTime;
    } else {
        // Создаем div для времени генерации
        var timeDiv = document.createElement("div");

        timeDiv.style.marginBottom = "5px";

        '<th title="Джиттер, мс">Jit</th>' +

}

// Функция для запуска теста на одном сервере
function runSingleServerTest() {
    // Выбираем текущий сервер
    var serverIndex = I("server").value;
    var serverObj = SPEEDTEST_SERVERS[serverIndex];
    document.getElementById("currentTest").innerHTML = "Тестируется: " + serverObj.name;
    
    s.onupdate=function(data){
        uiData=data;
    };
    s.onend=function(aborted){
        I("startStopBtn").className="";
        I("server").disabled=false;
        updateUI(true);
        
        if(!aborted){
            // Добавляем результат единичного теста в таблицу
            appendResult(
                serverObj.name,
                serverObj.serveropen,
                uiData.dlStatus,
                uiData.pingStatus,
                uiData.jitterStatus
            );
            
            // Проверяем, рекомендован ли сервер
            var recommended = isServerRecommended(uiData.jitterStatus, uiData.dlStatus, uiData.pingStatus);
            if(recommended) {
                document.getElementById("currentTest").innerHTML = 
                    '<div class="recommendationBox recommended"><span class="recommendIcon">👍</span> ' +
                    'Рекомендован: <strong>' + serverObj.name + '</strong></div>';
            } else {
                document.getElementById("currentTest").innerHTML = 
                    '<div class="recommendationBox notRecommended"><span class="recommendIcon">👎</span> ' +
                    'Не рекомендован</div>';
            }
            
            //if testId is present, show sharing panel, otherwise do nothing
            try{
                var testId=uiData.testId;
                if(testId!=null){
                    var shareURL=window.location.href.substring(0,window.location.href.lastIndexOf("/"))+"/results/?id="+testId;
                    I("resultsImg").src=shareURL;
                    I("resultsURL").value=shareURL;
                    I("testId").innerHTML=testId;
                    I("shareArea").style.display="";
                }
            }catch(e){}
        }
    };
    s.start();
}

// Подготовка к тестированию группы серверов
function prepareMultiTest(groupType) {
    stopAllTests = false;
    groupTestResults = [];
    
    // Обновляем глобальную переменную currentServer и массив serversToTest
    currentServer = 0;
    serversToTest = [];
    
    // Формируем массив серверов для тестирования в зависимости от выбранной группы
    for(var i=0; i<SPEEDTEST_SERVERS.length; i++) {
        if(SPEEDTEST_SERVERS[i].pingT==-1) continue;
        
        // Для "all_available" берем только серверы с serveropen="YES"
        if(groupType === "all_available" && SPEEDTEST_SERVERS[i].serveropen !== "YES") continue;
        
        serversToTest.push(i);
    }
    
    if(serversToTest.length > 0) {
        // Устанавливаем первый сервер и запускаем тестирование
        currentServer = serversToTest[0];
        document.getElementById("currentTest").innerHTML = "Тестируется: " + SPEEDTEST_SERVERS[currentServer].name + 
            " (1 из " + serversToTest.length + ")";
        
        s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
        startMultiTest();
    } else {
        // Если нет серверов для тестирования
        I("startStopBtn").className="";
        I("server").disabled=false;
        I("currentTest").innerHTML = "Нет серверов для тестирования";
    }
}

// Функция для тестирования всех серверов последовательно
function startMultiTest() {

    if (s.getState() == 3) {
        s.abort();
        I("startStopBtn").className = "";
        I("server").disabled = false;
        document.getElementById("currentTest").innerHTML = '';
        return;
    }

    var testTimeout = null;
    var testCompleted = false; // Флаг завершения теста
    var testStarted = Date.now(); // Время начала теста

    // ⏱ ТАЙМ-АУТ 20 СЕКУНД
	testTimeout = setTimeout(function () {
		if (!testCompleted && s.getState() == 3) { // Проверяем, что тест еще запущен
			console.warn("Timeout >30s, skip server:", SPEEDTEST_SERVERS[currentServer].name);
			
			testCompleted = true;
			
			appendResult(
				SPEEDTEST_SERVERS[currentServer].name,
				SPEEDTEST_SERVERS[currentServer].serveropen,
				"Таймаут",
				"Таймаут",
				"Таймаут"
			);
			
			groupTestResults.push({
				index: currentServer,
				name: SPEEDTEST_SERVERS[currentServer].name,
				serveropen: SPEEDTEST_SERVERS[currentServer].serveropen,
				dl: "Таймаут",
				ping: "Таймаут",
				jitter: "Таймаут",
				recommended: false
			});
			
			// Принудительно останавливаем тест
			if (s.getState() == 3) {
				s.abort();
			}
			
			// Даем время на остановку и переходим к следующему серверу
			setTimeout(function() {
				if (!stopAllTests) {
					moveToNextServer();
				}
			}, 500);
		}
	}, 30000);

    s.onupdate = function (data) {
        uiData = data;
        // Если получили данные, значит сервер отвечает
        if (data && data.dlStatus > 0) {
            // Продлевать таймаут не будем, но отметим что сервер живой
            console.log("Получены данные от сервера:", SPEEDTEST_SERVERS[currentServer].name);
        }
    };

    s.onend = function (aborted) {
        clearTimeout(testTimeout);
        
        // Если тест уже был обработан (например, по таймауту) - выходим
        if (testCompleted) {
            console.log("Тест уже обработан, пропускаем");
            return;
        }
        
        testCompleted = true; // Помечаем как завершенный
        
        if (stopAllTests) {
            appendResult(
                SPEEDTEST_SERVERS[currentServer].name,
                SPEEDTEST_SERVERS[currentServer].serveropen,
                "⛔ STOP",
                "⛔ STOP",
                "⛔ STOP"
            );

            I("startStopBtn").className = "";
            I("server").disabled = false;
            document.getElementById("currentTest").innerHTML = "⛔ Тест прерван";
            return;
        }
        
        if (!uiData) uiData = {
            dlStatus: 0,
            pingStatus: 999,
            jitterStatus: 999
        };
        
        // Проверяем, были ли реальные данные
        var dlValue = (uiData.dlStatus > 0) ? uiData.dlStatus : 0;
        var pingValue = (uiData.pingStatus < 999) ? uiData.pingStatus : 0;
        var jitterValue = (uiData.jitterStatus < 999) ? uiData.jitterStatus : 0;
        
        // Если тест прерван и нет данных - показываем таймаут
        if (aborted && dlValue === 0) {
            appendResult(
                SPEEDTEST_SERVERS[currentServer].name,
                SPEEDTEST_SERVERS[currentServer].serveropen,
                "Таймаут",
                "Таймаут",
                "Таймаут"
            );
            
            groupTestResults.push({
                index: currentServer,
                name: SPEEDTEST_SERVERS[currentServer].name,
                serveropen: SPEEDTEST_SERVERS[currentServer].serveropen,
                dl: "Таймаут",
                ping: "Таймаут",
                jitter: "Таймаут",
                recommended: false
            });
        } else {
            // Нормальное завершение
            appendResult(
                SPEEDTEST_SERVERS[currentServer].name,
                SPEEDTEST_SERVERS[currentServer].serveropen,
                dlValue,
                pingValue,
                jitterValue
            );

			groupTestResults.push({
				index: currentServer,
				name: SPEEDTEST_SERVERS[currentServer].name,
				serveropen: SPEEDTEST_SERVERS[currentServer].serveropen,
				dl: dlValue,
				ping: pingValue,
				jitter: jitterValue,
				recommended: isServerRecommended(jitterValue, dlValue, pingValue)  // ДОБАВЛЕН pingValue
			});
        }

        // Переходим к следующему серверу
        moveToNextServer();
    };

    // Функция перехода к следующему серверу
    function moveToNextServer() {
        var currentIndex = serversToTest.indexOf(currentServer);
        
        if (currentIndex < serversToTest.length - 1) {
            currentServer = serversToTest[currentIndex + 1];
            document.getElementById("currentTest").innerHTML =
                "Тестируется: " + SPEEDTEST_SERVERS[currentServer].name +
                " (" + (currentIndex + 2) + " из " + serversToTest.length + ")";
            s.setSelectedServer(SPEEDTEST_SERVERS[currentServer]);
            
            // Небольшая задержка перед следующим тестом
            setTimeout(function() {
                startMultiTest();
            }, 500);
        } else {
            // Все сервера пройдены
            I("startStopBtn").className = "";
            I("server").disabled = false;

            var bestServer = findBestServer(groupTestResults);

			if (bestServer) {

				var explanation = "";

				if (bestServer.rating === "❤︎") {
					explanation = "Минимальный джиттер (" + bestServer.jitter + " ms), ping " + bestServer.ping + " ms, скорость " + bestServer.dl + " Mbps";
				} else if (bestServer.rating === "✔︎✔︎✔︎") {
					explanation = "Хороший баланс: джиттер " + bestServer.jitter + " ms, ping " + bestServer.ping + " ms";
				} else if (bestServer.rating === "✔︎✔︎") {
					explanation = "Среднее качество: возможны задержки";
				} else if (bestServer.rating === "✔︎") {
					explanation = "Минимально пригодный сервер";
				}

				document.getElementById("currentTest").innerHTML =
					'<div class="recommendationBox recommended">➡︎ Рекомендован: <strong>' +
					bestServer.name + '</strong><br><small>' +
					explanation +
					'</small></div>';

			} else {

				document.getElementById("currentTest").innerHTML =
					'<div class="recommendationBox notRecommended">✖︎ Нет подходящих серверов</div>';
			}
        }
    }

    s.start();
}
// Функция для добавления результата в таблицу
function appendResult(server, serveropen, dl, ping, jitter) {
    // Определяем иконку статуса на основе джиттера и скорости загрузки
    let statusIcon = getServerRating(jitter, dl, ping);
    
    // Вместо статуса Online/OFF показываем ping
    let pingDisplay = ping;
    if (ping === "Таймаут" || ping === "⛔ STOP") {
        pingDisplay = ping; // Оставляем как есть
    } else if (typeof ping === 'number') {
        pingDisplay = format(ping) + " ms"; // Форматируем ping
    }
    
    // Добавляем строку с результатом в таблицу
    document.getElementById("multi_results").getElementsByTagName('tbody')[0].innerHTML +=
        '<tr><td>' +
        server + "</td><td>" +
        pingDisplay + "</td><td>" +  // Здесь теперь ping вместо статуса
        jitter + "</td><td>" +
        dl + "</td><td>" +
        statusIcon + "</td></tr>";
}

// Функция для определения, рекомендуется ли сервер
function isServerRecommended(jitter, dl, ping) {
    // Проверяем, что это не специальные значения
    if (jitter === "Таймаут" || dl === "Таймаут" || ping === "Таймаут") {
        return false;
    }
    if (jitter === "⛔ STOP" || dl === "⛔ STOP" || ping === "⛔ STOP") {
        return false;
    }
    
    // Преобразуем в числа
    var jitterNum = Number(jitter);
    var dlNum = Number(dl);
    var pingNum = Number(ping);
    
    // Новые критерии рекомендации
    if (dlNum > 100 && jitterNum < 4 && pingNum > 0 && pingNum < 999) {
        return true;
    }
    
    // Старые критерии (для обратной совместимости)
    return getServerRating(jitterNum, dlNum) !== "✖︎";
}
function getServerRating(jitter, dl, ping) {
    // Преобразуем в числа, если переданы как строки
    var jitterNum = Number(jitter);
    var dlNum = Number(dl);
    var pingNum = Number(ping);
    
    // ❌ жёсткие стоп-условия
    if (dlNum < 30 || jitterNum >= 15) {
        return "✖︎";
    }
    
    // 🏆 ОТЛИЧНО: джиттер < 4, скорость > 100, пинг < 50
    if (dlNum >= 100 && jitterNum < 4 && pingNum < 50) {
        return "❤︎";
    }
    
    // ✔︎✔︎✔︎ ОЧЕНЬ ХОРОШО: джиттер < 4, скорость > 100
    if (dlNum >= 100 && jitterNum < 4) {
        return "✔︎✔︎✔︎";
    }
    
    // ✔︎✔︎✔︎ ХОРОШО: стандартные критерии
    if (dlNum >= 80 && jitterNum < 5) {
        return "✔︎✔︎✔︎";
    }
    
    // ✔︎✔︎ НОРМАЛЬНО
    if (dlNum >= 50 && jitterNum < 10) {
        return "✔︎✔︎";
    }
    
    // ✔︎ ПРИЕМЛЕМО
    if (dlNum >= 30) {
        return "✔︎";
    }
    
    return "✖︎";
}

// Функция для поиска лучшего сервера среди протестированных
function findBestServer(results) {
    if (!results || results.length === 0) {
        return null;
    }

    // Оставляем только рекомендованные серверы (с новыми критериями)
    var recommendedServers = results.filter(function (server) {
        // Проверяем, что это не таймаут и не прерванный тест
        if (server.dl === "Таймаут" || server.dl === "⛔ STOP") {
            return false;
        }
        
        var dl = Number(server.dl);
        var jitter = Number(server.jitter);
        var ping = Number(server.ping);
        
        // Новые критерии рекомендации:
        // Джиттер < 4, скорость > 100, пинг валидный
        if (dl > 100 && jitter < 4 && ping > 0 && ping < 999) {
            return true;
        }
        
        // Также оставляем серверы, которые были рекомендованы по старым критериям
        return server.recommended === true;
    });

    if (recommendedServers.length === 0) {
        return null;
    }

    // ✅ СОРТИРОВКА: Приоритет - минимальный пинг
    recommendedServers.sort(function (a, b) {
        var pingA = Number(a.ping);
        var pingB = Number(b.ping);
        var jitterA = Number(a.jitter);
        var jitterB = Number(b.jitter);
        var speedA = Number(a.dl);
        var speedB = Number(b.dl);
        
        // 🔥 ГЛАВНЫЙ КРИТЕРИЙ - ПИНГ (чем меньше, тем лучше)
        if (pingA !== pingB) {
            return pingA - pingB;
        }
        
        // Если пинг одинаковый - сравниваем джиттер
        if (jitterA !== jitterB) {
            return jitterA - jitterB;
        }
        
        // Если всё одинаково - выбираем по скорости
        return speedB - speedA;
    });

    // Лучший сервер
    return recommendedServers[0];
}
